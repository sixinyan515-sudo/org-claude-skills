<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 日报 - {{DATE}}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* 头部样式 */
        .header {
            text-align: center;
            margin-bottom: 40px;
            color: white;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header .date {
            font-size: 1.1rem;
            opacity: 0.9;
            font-weight: 300;
        }

        .header .subtitle {
            font-size: 0.95rem;
            opacity: 0.8;
            margin-top: 8px;
        }

        /* 新闻卡片样式 */
        .news-card {
            background: white;
            border-radius: 16px;
            padding: 28px;
            margin-bottom: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .news-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 50px rgba(0,0,0,0.2);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: #1a202c;
            line-height: 1.4;
            flex: 1;
            margin-right: 16px;
        }

        .card-title a {
            color: #1a202c;
            text-decoration: none;
            transition: color 0.2s;
        }

        .card-title a:hover {
            color: #667eea;
        }

        .source-badge {
            display: inline-block;
            padding: 4px 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 0.75rem;
            font-weight: 500;
            border-radius: 20px;
            white-space: nowrap;
        }

        .card-summary {
            color: #4a5568;
            font-size: 0.95rem;
            line-height: 1.7;
            margin-bottom: 16px;
        }

        /* 标签样式 */
        .tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .tag {
            display: inline-block;
            padding: 5px 12px;
            background: #f7fafc;
            border: 1px solid #e2e8f0;
            color: #667eea;
            font-size: 0.8rem;
            font-weight: 500;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .tag:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        /* 底部信息 */
        .footer {
            text-align: center;
            color: white;
            opacity: 0.7;
            font-size: 0.85rem;
            margin-top: 40px;
            padding-top: 20px;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: white;
        }

        .empty-state h2 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .empty-state p {
            opacity: 0.8;
        }

        /* 响应式 */
        @media (max-width: 600px) {
            body {
                padding: 20px 15px;
            }

            .header h1 {
                font-size: 2rem;
            }

            .news-card {
                padding: 20px;
            }

            .card-header {
                flex-direction: column;
            }

            .card-title {
                margin-right: 0;
                margin-bottom: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1>AI 日报</h1>
            <div class="date">{{DATE}}</div>
            <div class="subtitle">精选每日最值得关注的 AI 行业资讯</div>
        </div>

        <!-- 新闻列表 -->
        {{NEWS_CARDS}}

        <!-- 底部 -->
        <div class="footer">
            <p>AI 日报 · 每日更新 · 掌握行业动态</p>
        </div>
    </div>
</body>
</html>
